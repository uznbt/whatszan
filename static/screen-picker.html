<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bagikan Layar</title>
  <style>
    /* ── Token Warna WhatsApp ─────────────────────────────────── */
    :root {
      /* Light (default) */
      --bg-app:       #f8f5f3;
      --bg-panel:     #ffffff;
      --bg-card:      #ffffff;
      --bg-card-hover:#f5f6f6;
      --bg-header:    #ffffff;
      --bg-footer:    #ffffff;
      --text-primary: #111b21;
      --text-secondary:#667781;
      --text-label:   #3b4a54;
      --border:       #e9edef;
      --accent:       #00a884;
      --accent-hover: #017f62;
      --accent-bg:    rgba(0,168,132,0.08);
      --btn-cancel-text:#667781;
      --btn-cancel-border:#d1d7db;
      --scrollbar-thumb:#c1c7cb;
      --tab-active-text:#00a884;
      --tab-inactive-text:#667781;
    }

    html.dark {
      --bg-app:           #161717;
      --bg-panel:         #1c1f1f;
      --bg-card:          #1c1f1f;
      --bg-card-hover:    #252929;
      --bg-header:        #1c1f1f;
      --bg-footer:        #1c1f1f;
      --text-primary:     #e9edef;
      --text-secondary:   #8696a0;
      --text-label:       #d1d7db;
      --border:           #252929;
      --accent:           #00a884;
      --accent-hover:     #06cf9c;
      --accent-bg:        rgba(0,168,132,0.12);
      --btn-cancel-text:  #8696a0;
      --btn-cancel-border:#252929;
      --scrollbar-thumb:  #252929;
      --tab-active-text:  #00a884;
      --tab-inactive-text:#8696a0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg-app);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    .header-icon {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--accent-bg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .header-text h1 { font-size: 15px; font-weight: 600; line-height: 1.3; }
    .header-text p  { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

    .tabs {
      background: var(--bg-header);
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 0;
      font-size: 13px; font-weight: 500;
      color: var(--tab-inactive-text);
      background: none; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      -webkit-app-region: no-drag;
    }

    .tab.active { color: var(--tab-active-text); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text-primary); background: var(--accent-bg); }

    .grid-container {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: var(--bg-app);
    }

    .grid-container::-webkit-scrollbar { width: 5px; }
    .grid-container::-webkit-scrollbar-track { background: transparent; }
    .grid-container::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 999px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 10px;
    }

    .source-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s, transform 0.12s;
    }

    .source-card:hover { border-color: var(--accent); background: var(--bg-card-hover); transform: translateY(-1px); }
    .source-card.selected { border-color: var(--accent); background: var(--accent-bg); }

    .thumb-wrap {
      width: 100%; aspect-ratio: 16/9;
      background: var(--border);
      position: relative; overflow: hidden;
    }

    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .thumb-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    .thumb-placeholder svg { opacity: 0.3; }

    .selected-badge {
      position: absolute; top: 6px; right: 6px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--accent);
      display: none; align-items: center; justify-content: center;
    }

    .source-card.selected .selected-badge { display: flex; }

    .source-label {
      padding: 7px 10px 8px;
      font-size: 12px; font-weight: 500;
      color: var(--text-label);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      border-top: 1px solid var(--border);
    }

    .empty {
      grid-column: 1/-1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 0; gap: 10px;
      color: var(--text-secondary);
    }

    .empty p { font-size: 13px; }

    footer {
      background: var(--bg-footer);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: flex-end;
      gap: 8px; flex-shrink: 0;
    }

    .btn {
      padding: 8px 22px;
      border-radius: 20px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.01em;
    }

    .btn-cancel {
      border: 1px solid var(--btn-cancel-border);
      background: transparent;
      color: var(--btn-cancel-text);
    }

    .btn-cancel:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

    .btn-share {
      border: none;
      background: var(--accent);
      color: #fff;
    }

    .btn-share:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-share:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="header-icon">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/>
      <polyline points="8 21 12 17 16 21"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>Bagikan Layar</h1>
    <p>Pilih layar atau jendela yang ingin dibagikan</p>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tab-screens" onclick="switchTab('screens')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    Layar
  </button>
  <button class="tab" id="tab-windows" onclick="switchTab('windows')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
    Jendela
  </button>
</div>

<div class="grid-container">
  <div class="grid" id="grid">
    <div class="empty"><p>Memuat sumber...</p></div>
  </div>
</div>

<footer>
  <button class="btn btn-cancel" onclick="cancel()">Batal</button>
  <button class="btn btn-share" id="btn-share" disabled onclick="share()">Bagikan</button>
</footer>

<script>
  // Terapkan tema dari URL query param
  const params = new URLSearchParams(window.location.search);
  if (params.get('theme') === 'dark') document.documentElement.classList.add('dark');

  let allSources = [], selectedId = null, currentTab = 'screens';

  window.electronAPI = {
    setSources(sources, isDark) {
      allSources = sources;
      if (isDark !== undefined) document.documentElement.classList.toggle('dark', isDark);
      renderTab(currentTab);
    },
  };

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    selectedId = null;
    document.getElementById('btn-share').disabled = true;
    renderTab(tab);
  }

  function renderTab(tab) {
    const grid    = document.getElementById('grid');
    const sources = allSources.filter(s =>
      tab === 'screens' ? s.id.startsWith('screen:') : !s.id.startsWith('screen:')
    );

    if (sources.length === 0) {
      grid.innerHTML = `<div class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5" stroke-linecap="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
        </svg>
        <p>Tidak ada ${tab === 'screens' ? 'layar' : 'jendela'} yang tersedia</p>
      </div>`;
      return;
    }

    grid.innerHTML = sources.map(s => `
      <div class="source-card${s.id === selectedId ? ' selected' : ''}"
           onclick="selectSource('${s.id}')" data-id="${s.id}">
        <div class="thumb-wrap">
          ${s.thumbnail
            ? `<img src="${s.thumbnail}" alt="" loading="eager"/>`
            : `<div class="thumb-placeholder">
                 <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5" stroke-linecap="round">
                   <rect x="2" y="3" width="20" height="14" rx="2"/>
                 </svg>
               </div>`}
          <div class="selected-badge">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <div class="source-label" title="${s.name.replace(/"/g,'&quot;')}">${s.name.replace(/</g,'&lt;')}</div>
      </div>`).join('');
  }

  function selectSource(id) {
    selectedId = id;
    document.querySelectorAll('.source-card').forEach(c =>
      c.classList.toggle('selected', c.dataset.id === id)
    );
    document.getElementById('btn-share').disabled = false;
  }

  function share()  { if (selectedId) window.screenPickerIpc?.selectSource(selectedId); }
  function cancel() { window.screenPickerIpc?.selectSource(null); }
</script>
</body>
</html>
