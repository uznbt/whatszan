name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write # Dibutuhkan agar bisa mengupload ke tab Releases

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false # Biarkan job lain tetap jalan meski salah satu gagal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      # Hanya di Linux: install alat build sistem yang dibutuhkan untuk AppImage / pacman / rpm / deb
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools fakeroot dpkg rpm

      - name: Install dependencies
        run: npm ci

      # Generate icon.ico (dibutuhkan untuk build Windows)
      - name: Generate Windows icon
        run: node build/generate-ico.mjs

      # Build and publish ke GitHub Releases
      - name: Build & Publish Release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
